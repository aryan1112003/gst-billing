<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Erp System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .breadcrumb {
            color: #666;
            font-size: 14px;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }

        .filter-group select,
        .filter-group input {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .report-categories {
            display: grid;
            gap: 20px;
        }

        .category-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .category-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }

        .category-header:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3f8f 100%);
        }

        .category-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-icon {
            font-size: 24px;
        }

        .category-title {
            font-size: 18px;
            font-weight: 600;
        }

        .category-reports {
            display: none;
            padding: 10px;
        }

        .category-reports.active {
            display: block;
        }

        .report-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .report-item:hover {
            background: #f8f9fa;
        }

        .report-item:last-child {
            border-bottom: none;
        }

        .report-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .report-item-icon {
            color: #667eea;
            font-size: 18px;
        }

        .report-item-title {
            font-size: 15px;
            font-weight: 500;
            color: #333;
        }

        .report-detail {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: none;
        }

        .report-detail.active {
            display: block;
        }

        .report-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .report-detail-title {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .report-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .btn-secondary {
            background: #f44336;
            color: white;
        }

        .btn-secondary:hover {
            background: #da190b;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }

        .btn-back {
            background: #666;
            color: white;
        }

        .btn-back:hover {
            background: #555;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .report-table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            color: #555;
            border-bottom: 2px solid #e0e0e0;
        }

        .report-table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .report-table tr:hover {
            background: #f8f9fa;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading i {
            font-size: 32px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px 20px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .no-data i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .summary-card-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .summary-card-value {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .summary-card.positive .summary-card-value {
            color: #4CAF50;
        }

        .summary-card.negative .summary-card-value {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Reports</h1>
            <div class="breadcrumb">
                <i class="fas fa-home"></i> / Reports
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-row">
                <div class="filter-group">
                    <label>Period</label>
                    <select id="periodFilter">
                        <option value="this-month">This Month</option>
                        <option value="last-month">Last Month</option>
                        <option value="this-quarter">This Quarter</option>
                        <option value="this-year">This Year</option>
                        <option value="custom">Custom Range</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>From Date</label>
                    <input type="date" id="fromDate">
                </div>
                <div class="filter-group">
                    <label>To Date</label>
                    <input type="date" id="toDate">
                </div>
            </div>
        </div>

        <!-- Report Categories -->
        <div id="reportCategories" class="report-categories">
            <!-- Categories will be loaded here -->
        </div>

        <!-- Report Detail View -->
        <div id="reportDetail" class="report-detail">
            <div class="report-detail-header">
                <h2 class="report-detail-title" id="reportTitle"></h2>
                <div class="report-actions">
                    <button class="btn btn-back" onclick="closeReport()">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                    <button class="btn btn-primary" onclick="downloadExcel()">
                        <i class="fas fa-file-excel"></i> Excel
                    </button>
                    <button class="btn btn-secondary" onclick="downloadPDF()">
                        <i class="fas fa-file-pdf"></i> PDF
                    </button>
                </div>
            </div>
            <div id="reportContent">
                <!-- Report content will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:5000/api';
        let currentReport = null;
        let currentReportData = null;
        let authToken = localStorage.getItem('authToken') || '';

        // Report Categories Configuration
        const reportCategories = [
            {
                id: 'sales',
                title: 'Sales',
                icon: 'fa-chart-line',
                color: '#4CAF50',
                reports: [
                    { id: 'sales', title: 'Sales Report', endpoint: '/reports/sales' },
                    { id: 'sales-by-customer', title: 'Sales by Customer', endpoint: '/reports/sales-by-customer' },
                    { id: 'sales-by-item', title: 'Sales by Item', endpoint: '/reports/sales-by-item' },
                    { id: 'sales-by-salesperson', title: 'Sales by Salesperson', endpoint: '/reports/sales-by-salesperson' }
                ]
            },
            {
                id: 'receivables',
                title: 'Receivables',
                icon: 'fa-wallet',
                color: '#2196F3',
                reports: [
                    { id: 'receivables', title: 'Receivables Report', endpoint: '/reports/receivables' },
                    { id: 'customer-balances', title: 'Customer Balances', endpoint: '/reports/customer-balances' },
                    { id: 'aging-summary', title: 'Aging Summary', endpoint: '/reports/aging-summary' },
                    { id: 'aging-details', title: 'Aging Details', endpoint: '/reports/aging-details' },
                    { id: 'invoice-details', title: 'Invoice Details', endpoint: '/reports/invoice-details' }
                ]
            },
            {
                id: 'payments',
                title: 'Payments Received',
                icon: 'fa-credit-card',
                color: '#009688',
                reports: [
                    { id: 'payments-received', title: 'Payments Received', endpoint: '/reports/payments-received' },
                    { id: 'withholding-tax', title: 'Withholding Tax', endpoint: '/reports/withholding-tax' }
                ]
            },
            {
                id: 'expenses',
                title: 'Purchases and Expenses',
                icon: 'fa-shopping-cart',
                color: '#FF9800',
                reports: [
                    { id: 'expense-details', title: 'Expense Details', endpoint: '/reports/expense-details' },
                    { id: 'expenses-by-category', title: 'Expenses by Category', endpoint: '/reports/expenses-by-category' },
                    { id: 'expenses-by-customer', title: 'Expenses by Customer', endpoint: '/reports/expenses-by-customer' }
                ]
            },
            {
                id: 'inventory',
                title: 'Inventory',
                icon: 'fa-boxes',
                color: '#9C27B0',
                reports: [
                    { id: 'inventory-summary', title: 'Inventory Summary', endpoint: '/reports/inventory-summary' },
                    { id: 'inventory-valuation', title: 'Inventory Valuation', endpoint: '/reports/inventory-valuation' },
                    { id: 'stock-summary', title: 'Stock Summary', endpoint: '/reports/stock-summary' },
                    { id: 'product-sales', title: 'Product Sales Report', endpoint: '/reports/product-sales' }
                ]
            },
            {
                id: 'financial',
                title: 'Financial Reports',
                icon: 'fa-chart-pie',
                color: '#1976D2',
                reports: [
                    { id: 'profit-loss', title: 'Profit and Loss', endpoint: '/reports/profit-loss' },
                    { id: 'balance-sheet', title: 'Balance Sheet', endpoint: '/reports/balance-sheet' },
                    { id: 'cash-flow', title: 'Cash Flow Statement', endpoint: '/reports/cash-flow' },
                    { id: 'trial-balance', title: 'Trial Balance', endpoint: '/reports/trial-balance' }
                ]
            },
            {
                id: 'tax',
                title: 'Tax Reports',
                icon: 'fa-receipt',
                color: '#F44336',
                reports: [
                    { id: 'gst-summary', title: 'GST Summary', endpoint: '/reports/gst-summary' },
                    { id: 'gstr1', title: 'GSTR-1', endpoint: '/reports/gstr1' },
                    { id: 'gstr2', title: 'GSTR-2', endpoint: '/reports/gstr2' },
                    { id: 'gstr3b', title: 'GSTR-3B', endpoint: '/reports/gstr3b' },
                    { id: 'tax-summary', title: 'Tax Summary', endpoint: '/reports/tax-summary' }
                ]
            },
            {
                id: 'vendor',
                title: 'Vendor Reports',
                icon: 'fa-building',
                color: '#FF6F00',
                reports: [
                    { id: 'vendor-balances', title: 'Vendor Balances', endpoint: '/reports/vendor-balances' },
                    { id: 'vendor-credits', title: 'Vendor Credits', endpoint: '/reports/vendor-credits' },
                    { id: 'purchase-by-vendor', title: 'Purchase by Vendor', endpoint: '/reports/purchase-by-vendor' },
                    { id: 'vendor-payments', title: 'Vendor Payments', endpoint: '/reports/vendor-payments' }
                ]
            }
        ];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initializeDates();
            renderCategories();
            setupEventListeners();
        });

        function initializeDates() {
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            
            document.getElementById('fromDate').valueAsDate = firstDay;
            document.getElementById('toDate').valueAsDate = today;
        }

        function renderCategories() {
            const container = document.getElementById('reportCategories');
            container.innerHTML = reportCategories.map(category => `
                <div class="category-card">
                    <div class="category-header" onclick="toggleCategory('${category.id}')" style="background: ${category.color}">
                        <div class="category-header-left">
                            <i class="fas ${category.icon} category-icon"></i>
                            <span class="category-title">${category.title}</span>
                        </div>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="category-reports" id="category-${category.id}">
                        ${category.reports.map(report => `
                            <div class="report-item" onclick="loadReport('${report.id}', '${report.title}', '${report.endpoint}')">
                                <div class="report-item-left">
                                    <i class="fas fa-file-alt report-item-icon"></i>
                                    <span class="report-item-title">${report.title}</span>
                                </div>
                                <i class="fas fa-chevron-right"></i>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleCategory(categoryId) {
            const element = document.getElementById(`category-${categoryId}`);
            element.classList.toggle('active');
        }

        function setupEventListeners() {
            document.getElementById('periodFilter').addEventListener('change', handlePeriodChange);
            document.getElementById('fromDate').addEventListener('change', applyFilters);
            document.getElementById('toDate').addEventListener('change', applyFilters);
        }

        function handlePeriodChange(e) {
            const period = e.target.value;
            const today = new Date();
            let fromDate, toDate;

            switch(period) {
                case 'this-month':
                    fromDate = new Date(today.getFullYear(), today.getMonth(), 1);
                    toDate = today;
                    break;
                case 'last-month':
                    fromDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                    toDate = new Date(today.getFullYear(), today.getMonth(), 0);
                    break;
                case 'this-quarter':
                    const quarter = Math.floor(today.getMonth() / 3);
                    fromDate = new Date(today.getFullYear(), quarter * 3, 1);
                    toDate = today;
                    break;
                case 'this-year':
                    fromDate = new Date(today.getFullYear(), 0, 1);
                    toDate = today;
                    break;
            }

            if (fromDate && toDate) {
                document.getElementById('fromDate').valueAsDate = fromDate;
                document.getElementById('toDate').valueAsDate = toDate;
                applyFilters();
            }
        }

        function applyFilters() {
            if (currentReport) {
                loadReport(currentReport.id, currentReport.title, currentReport.endpoint);
            }
        }

        async function loadReport(id, title, endpoint) {
            currentReport = { id, title, endpoint };
            
            // Hide categories, show detail
            document.getElementById('reportCategories').style.display = 'none';
            document.getElementById('reportDetail').classList.add('active');
            document.getElementById('reportTitle').textContent = title;
            
            // Show loading
            document.getElementById('reportContent').innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Loading report data...</p>
                </div>
            `;

            try {
                const fromDate = document.getElementById('fromDate').value;
                const toDate = document.getElementById('toDate').value;
                
                const params = new URLSearchParams();
                if (fromDate) params.append('fromDate', fromDate);
                if (toDate) params.append('toDate', toDate);
                
                const url = `${API_BASE_URL}${endpoint}${params.toString() ? '?' + params.toString() : ''}`;
                
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                currentReportData = data;
                renderReportData(data);
            } catch (error) {
                console.error('Error loading report:', error);
                document.getElementById('reportContent').innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-circle"></i>
                        <span>Error loading report: ${error.message}</span>
                    </div>
                `;
            }
        }

        function renderReportData(data) {
            const content = document.getElementById('reportContent');
            
            if (!data.success || !data.data) {
                content.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-inbox"></i>
                        <p>No data available for this report</p>
                    </div>
                `;
                return;
            }

            const reportData = data.data.report || data.data.metrics || data.data;
            
            // Render based on data structure
            if (Array.isArray(reportData)) {
                renderTableData(reportData);
            } else if (reportData.rows && Array.isArray(reportData.rows)) {
                renderTableData(reportData.rows);
            } else if (typeof reportData === 'object') {
                renderObjectData(reportData);
            } else {
                content.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-inbox"></i>
                        <p>No data available</p>
                    </div>
                `;
            }
        }

        function renderTableData(rows) {
            if (!rows || rows.length === 0) {
                document.getElementById('reportContent').innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-inbox"></i>
                        <p>No data available in table</p>
                    </div>
                `;
                return;
            }

            const columns = Object.keys(rows[0]);
            const html = `
                <table class="report-table">
                    <thead>
                        <tr>
                            ${columns.map(col => `<th>${formatColumnName(col)}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.map(row => `
                            <tr>
                                ${columns.map(col => `<td>${formatCellValue(row[col], col)}</td>`).join('')}
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            document.getElementById('reportContent').innerHTML = html;
        }

        function renderObjectData(data) {
            // Render summary cards for object data
            const html = `
                <div class="summary-cards">
                    ${Object.entries(data).map(([key, value]) => {
                        const isPositive = typeof value === 'number' && value >= 0;
                        return `
                            <div class="summary-card ${isPositive ? 'positive' : 'negative'}">
                                <div class="summary-card-label">${formatColumnName(key)}</div>
                                <div class="summary-card-value">${formatCellValue(value, key)}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            
            document.getElementById('reportContent').innerHTML = html;
        }

        function formatColumnName(name) {
            return name
                .replace(/_/g, ' ')
                .replace(/([A-Z])/g, ' $1')
                .replace(/^./, str => str.toUpperCase())
                .trim();
        }

        function formatCellValue(value, columnName) {
            if (value === null || value === undefined) return '-';
            
            // Format currency
            if (columnName.toLowerCase().includes('amount') || 
                columnName.toLowerCase().includes('sales') ||
                columnName.toLowerCase().includes('balance') ||
                columnName.toLowerCase().includes('total')) {
                if (typeof value === 'number') {
                    return '₹' + value.toLocaleString('en-IN', { maximumFractionDigits: 2 });
                }
            }
            
            // Format dates
            if (columnName.toLowerCase().includes('date')) {
                const date = new Date(value);
                if (!isNaN(date.getTime())) {
                    return date.toLocaleDateString('en-IN');
                }
            }
            
            return value;
        }

        function closeReport() {
            document.getElementById('reportCategories').style.display = 'grid';
            document.getElementById('reportDetail').classList.remove('active');
            currentReport = null;
            currentReportData = null;
        }

        function downloadExcel() {
            if (!currentReportData) return;
            
            const reportData = currentReportData.data.report || currentReportData.data.metrics || currentReportData.data;
            let rows = Array.isArray(reportData) ? reportData : reportData.rows || [];
            
            if (rows.length === 0) {
                alert('No data to export');
                return;
            }

            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, currentReport.title);
            
            const filename = `${currentReport.title.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, filename);
        }

        function downloadPDF() {
            if (!currentReportData) return;
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const reportData = currentReportData.data.report || currentReportData.data.metrics || currentReportData.data;
            let rows = Array.isArray(reportData) ? reportData : reportData.rows || [];
            
            if (rows.length === 0) {
                alert('No data to export');
                return;
            }

            // Add title
            doc.setFontSize(18);
            doc.text(currentReport.title, 14, 20);
            
            // Add date range
            doc.setFontSize(10);
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            doc.text(`From: ${fromDate} To: ${toDate}`, 14, 30);
            
            // Add table
            const columns = Object.keys(rows[0]).map(formatColumnName);
            const data = rows.map(row => Object.values(row).map(val => formatCellValue(val, '')));
            
            doc.autoTable({
                head: [columns],
                body: data,
                startY: 40,
                styles: { fontSize: 8 },
                headStyles: { fillColor: [102, 126, 234] }
            });
            
            const filename = `${currentReport.title.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.pdf`;
            doc.save(filename);
        }
    </script>
</body>
</html>
